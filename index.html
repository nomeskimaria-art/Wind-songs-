@import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');

:root {
  --clay-font: "Helvetica", "Arial", sans-serif;
}

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: var(--clay-font);
  text-transform: lowercase;
  font-weight: bold;
  color: white;
}

.tool-canvas-area {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#start-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(15px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  z-index: 100;
  cursor: pointer;
  transition: opacity 0.8s ease;
  text-align: center;
}

#start-btn-text {
  font-size: clamp(1.8rem, 6vw, 3rem);
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}

#start-sub-text {
  font-size: 0.9rem;
  margin-bottom: 2.5rem;
  opacity: 0.8;
}

#start-instructions {
  max-width: 480px;
  font-size: 0.75rem;
  line-height: 1.7;
  opacity: 0.6;
  padding: 0 2.5rem;
}

#persistent-info {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 650px;
  text-align: center;
  color: white;
  font-size: 0.7rem;
  line-height: 1.6;
  opacity: 0;
  pointer-events: none;
  z-index: 50;
  transition: opacity 1s ease;
}

#status-indicator {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: rgba(255,255,255,0.4);
  font-size: 9px;
  z-index: 60;
}

canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
}
